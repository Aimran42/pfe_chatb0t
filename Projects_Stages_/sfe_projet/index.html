<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classification Qualité Phosphate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.logo {
    width: 120px;
    margin-bottom: 15px;
}

.card {
    border-radius: 20px;
    padding: 30px;
}

.btn-custom {
    background: #2ecc71;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

.btn-custom:hover {
    background: #27ae60;
}

.result-box {
    font-size: 1.5rem;
    font-weight: bold;
    text-align: center;
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    display: none;
}

.bonne {
    background-color: #27ae60;
    color: white;
}

.moyenne {
    background-color: #f39c12;
    color: white;
}

.mauvaise {
    background-color: #e74c3c;
    color: white;
}

.spinner-box {
    display: none;
    text-align: center;
    margin-top: 20px;
}

footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
    <div class="card shadow-lg text-dark">

        <!-- ✅ LOGO OCP -->
        <div class="text-center">
            <img src="ocp.png" alt="OCP Logo" class="logo img-fluid">
        </div>

        <h2 class="text-center mb-4">Classification de la Qualité du Phosphate</h2>

        <form id="predictionForm">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>P2O5 (%)</label>
                    <input type="number" step="0.1" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>CaO (%)</label>
                    <input type="number" step="0.1" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>SiO2 (%)</label>
                    <input type="number" step="0.1" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>MgO (%)</label>
                    <input type="number" step="0.1" class="form-control" required>
                </div>

                <div class="col-md-12 mb-3">
                    <label>Humidité (%)</label>
                    <input type="number" step="0.1" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-custom w-100">
                Analyser la qualité
            </button>

        </form>

        <!-- Animation -->
        <div class="spinner-box" id="spinnerBox">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">Analyse en cours... Le modèle réfléchit 🤖</p>
        </div>

        <!-- Résultat -->
        <div id="resultBox" class="result-box"></div>

    </div>
</div>

<footer>
© 2026 - Projet Data Science | OCP
</footer>

<script>
document.getElementById("predictionForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const spinner = document.getElementById("spinnerBox");
    const resultBox = document.getElementById("resultBox");

    resultBox.style.display = "none";
    spinner.style.display = "block";

    setTimeout(function() {

        spinner.style.display = "none";

        const classes = ["Bonne", "Moyenne", "Mauvaise"];
        const randomIndex = Math.floor(Math.random() * classes.length);
        const result = classes[randomIndex];

        resultBox.className = "result-box";

        if (result === "Bonne") {
            resultBox.classList.add("bonne");
            resultBox.innerHTML = "✅ Bonne qualité";
        }
        else if (result === "Moyenne") {
            resultBox.classList.add("moyenne");
            resultBox.innerHTML = "⚠️ Qualité moyenne";
        }
        else {
            resultBox.classList.add("mauvaise");
            resultBox.innerHTML = "❌ Mauvaise qualité";
        }

        resultBox.style.display = "block";

    }, Math.random() * 2000 + 2000);
});
</script>

</body>
</html>
